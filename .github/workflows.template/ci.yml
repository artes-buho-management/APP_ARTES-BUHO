name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sintaxis basica
        run: node --check src/server.js

      - name: Levantar servidor y probar health
        run: |
          node src/server.js &
          sleep 2
          curl --fail http://127.0.0.1:8080/health
