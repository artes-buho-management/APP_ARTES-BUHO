name: Deploy Coolify

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar despliegue en Coolify
        env:
          COOLIFY_DEPLOY_HOOK: ${{ secrets.COOLIFY_DEPLOY_HOOK }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_HOOK" ]; then
            echo "Falta secreto COOLIFY_DEPLOY_HOOK"
            exit 1
          fi
          curl --fail --request POST "$COOLIFY_DEPLOY_HOOK"
