<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APP_ARTES-BUHO</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f9fafb;
        --accent: #f59e0b;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1f2937 0%, var(--bg) 55%);
      }
      .card {
        width: min(700px, 92vw);
        background: linear-gradient(180deg, #1f2937, var(--card));
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
        letter-spacing: 0.03em;
      }
      .pill {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #1e293b;
        border: 1px solid #334155;
        color: var(--accent);
        font-weight: bold;
      }
      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>APP_ARTES-BUHO</h1>
      <p>Entorno base creado y listo para despliegue en Coolify.</p>
      <p>Cuando subas cambios al repositorio, Coolify puede desplegar automaticamente.</p>
      <span class="pill">Dominio objetivo: artesbuhomanagement.com</span>
    </main>
  </body>
</html>
